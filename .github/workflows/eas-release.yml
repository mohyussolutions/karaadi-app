name: Store Release (App Store + Google Play)

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build-and-submit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - run: npm ci

      - name: Restore store credentials
        env:
          ASC_API_KEY_P8: ${{ secrets.ASC_API_KEY_P8 }}
          GOOGLE_PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON || secrets.GOOGLE_PLAY_SERVICE_ACCOUNT }}
        run: |
          if [ -z "$GOOGLE_PLAY_SERVICE_ACCOUNT_JSON" ]; then
            echo "::error::Missing Google Play service account secret. Set GOOGLE_PLAY_SERVICE_ACCOUNT_JSON (preferred) or legacy GOOGLE_PLAY_SERVICE_ACCOUNT."
            exit 1
          fi
          printf '%s' "$ASC_API_KEY_P8" > AuthKey_T4K9ZTB9VV.p8
          printf '%s' "$GOOGLE_PLAY_SERVICE_ACCOUNT_JSON" > google-play-service-account.json
          if ! JSON_VALIDATION_ERROR="$(node -e "const fs=require('fs'); JSON.parse(fs.readFileSync('google-play-service-account.json','utf8'));" 2>&1)"; then
            echo "::error::Failed to validate google-play-service-account.json. Ensure GOOGLE_PLAY_SERVICE_ACCOUNT_JSON contains complete valid JSON (no truncation/extra escaping). Parser output: $JSON_VALIDATION_ERROR"
            exit 1
          fi

      - name: Build and submit to both stores
        run: eas build --platform all --profile production --non-interactive --no-wait --auto-submit
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
