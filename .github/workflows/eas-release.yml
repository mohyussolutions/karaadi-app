name: Store Release (App Store + Google Play)

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build-and-submit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - run: npm ci

      - name: Restore store credentials
        env:
          ASC_API_KEY_P8: ${{ secrets.ASC_API_KEY_P8 }}
          GOOGLE_PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          GOOGLE_PLAY_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT }}
        run: |
          printf '%s' "$ASC_API_KEY_P8" > AuthKey_T4K9ZTB9VV.p8

          if [ -n "$GOOGLE_PLAY_SERVICE_ACCOUNT_JSON" ]; then
            PLAY_SERVICE_ACCOUNT_JSON="$GOOGLE_PLAY_SERVICE_ACCOUNT_JSON"
          else
            PLAY_SERVICE_ACCOUNT_JSON="$GOOGLE_PLAY_SERVICE_ACCOUNT"
          fi

          if [ -z "$PLAY_SERVICE_ACCOUNT_JSON" ]; then
            echo "Missing Google Play service account secret. Set GOOGLE_PLAY_SERVICE_ACCOUNT_JSON or GOOGLE_PLAY_SERVICE_ACCOUNT." >&2
            exit 1
          fi

          printf '%s' "$PLAY_SERVICE_ACCOUNT_JSON" > google-play-service-account.json
          python - <<'PY'
          import json
          import sys

          try:
              with open("google-play-service-account.json", "r", encoding="utf-8") as f:
                  json.load(f)
          except json.JSONDecodeError as exc:
              print(f"Invalid Google Play service account JSON: {exc}", file=sys.stderr)
              sys.exit(1)
          PY

      - name: Build and submit to both stores
        run: eas build --platform all --profile production --non-interactive --no-wait --auto-submit
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
